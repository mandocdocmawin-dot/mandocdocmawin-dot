name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure dependencies (jq and docker)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq docker.io
          sudo systemctl start docker || true
          sudo usermod -aG docker $USER || true

      - name: Recently used
        uses: lowlighter/metrics@v3.34.0
        with:
          filename: metrics.plugin.languages.recent.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_sections: recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4
          plugin_languages_recent_days: 5
          plugin_languages_recent_load: 30

      - name: Followers
        uses: lowlighter/metrics@v3.34.0
        with:
          filename: metrics.plugin.people.followers.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 24
          plugin_people_size: 28