name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Unang step: In-update natin para maiwasan ang error sa recent commits
      - name: Languages used
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.recent.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          # ⬇️ Pinalitan ang 'recently-used' ng 'most-used'
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4
          # Tinanggal na natin ang plugin_languages_recent_days at load dahil hindi na ito kailangan

      # Pangalawang step: Ang iyong followers section[cite: 3]
      - name: Followers
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.people.followers.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 24
          plugin_people_size: 28